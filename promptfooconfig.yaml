description: "Diabetes Predictor API Tests"

providers:
  - id: http
    config:
      url: http://localhost:8000/predict
      method: POST
      headers:
        Content-Type: application/json
      body:
        pregnancies: "{{pregnancies}}"
        glucose: "{{glucose}}"
        blood_pressure: "{{blood_pressure}}"
        skin_thickness: "{{skin_thickness}}"
        insulin: "{{insulin}}"
        bmi: "{{bmi}}"
        diabetes_pedigree: "{{diabetes_pedigree}}"
        age: "{{age}}"

prompts:
  - "predict"

tests:
  - vars:
      pregnancies: "6"
      glucose: "148"
      blood_pressure: "72"
      skin_thickness: "35"
      insulin: "0"
      bmi: "33.6"
      diabetes_pedigree: "0.627"
      age: "50"

  - vars:
      pregnancies: "1"
      glucose: "85"
      blood_pressure: "66"
      skin_thickness: "29"
      insulin: "0"
      bmi: "26.6"
      diabetes_pedigree: "0.351"
      age: "31"

  - vars:
      pregnancies: "8"
      glucose: "183"
      blood_pressure: "64"
      skin_thickness: "0"
      insulin: "0"
      bmi: "23.3"
      diabetes_pedigree: "0.672"
      age: "32"

  - vars:
      pregnancies: "0"
      glucose: "137"
      blood_pressure: "40"
      skin_thickness: "35"
      insulin: "168"
      bmi: "43.1"
      diabetes_pedigree: "2.288"
      age: "33"