apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-diabetes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pranavi11111/mlops-project
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
