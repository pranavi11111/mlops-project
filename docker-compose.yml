version: '3.8'

services:
  mlops-api:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - ./model:/app/model
      - ./data:/app/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - '5000:5000'
    command: mlflow server --host 0.0.0.0 --port 5000

  prometheus:
    image: prom/prometheus
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    ports:
      - '3000:3000'
